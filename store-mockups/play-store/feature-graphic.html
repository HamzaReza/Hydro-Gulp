<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hydro: Gulp — feature graphic 1024×500</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* LightTheme from constants/theme.ts */
      :root {
        --bg-start: #f7f8f0;
        --bg-end: #d6eeff;
        --text: #355872;
        --secondary: #7aaace;
        --accent-light: #9cd5ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0d1520;
        font-family: "Space Grotesk", system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .canvas {
        width: 1024px;
        height: 500px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, var(--bg-start) 0%, #e8f3f9 45%, var(--bg-end) 100%);
      }

      /* Soft brand-colored orbs, echoing the app's blur cards */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(2px);
      }

      .blob.b1 {
        width: 340px;
        height: 340px;
        right: -110px;
        top: -140px;
        background: radial-gradient(circle, rgba(156, 213, 255, 0.5), rgba(156, 213, 255, 0) 70%);
      }

      .blob.b2 {
        width: 260px;
        height: 260px;
        right: 240px;
        bottom: -150px;
        background: radial-gradient(circle, rgba(122, 170, 206, 0.35), rgba(122, 170, 206, 0) 70%);
      }

      .blob.b3 {
        width: 300px;
        height: 300px;
        left: -90px;
        bottom: -130px;
        background: radial-gradient(circle, rgba(156, 213, 255, 0.55), rgba(156, 213, 255, 0) 70%);
      }

      /* Faint concentric progress ring behind the mascot — nods to the app's goal ring */
      .ring {
        position: absolute;
        left: 42px;
        top: 40px;
        width: 420px;
        height: 420px;
        border-radius: 50%;
        border: 2.5px dashed rgba(122, 170, 206, 0.4);
      }

      .ring.inner {
        left: 74px;
        top: 72px;
        width: 356px;
        height: 356px;
        border: 10px solid rgba(156, 213, 255, 0.28);
      }

      .mascot {
        position: absolute;
        /* logo art has ~28% transparent padding — oversize to render ~330px of visible art */
        left: 22px;
        top: 16px;
        width: 460px;
        height: 460px;
        object-fit: contain;
        filter: drop-shadow(0 20px 32px rgba(53, 88, 114, 0.28));
      }

      .copy {
        position: absolute;
        left: 470px;
        right: 56px;
        top: 50%;
        transform: translateY(-50%);
      }

      .brand {
        margin: 0 0 14px;
        font-size: 76px;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1;
        color: var(--text);
      }

      .brand .alt {
        color: var(--secondary);
      }

      .tagline {
        margin: 0 0 30px;
        font-size: 31px;
        font-weight: 500;
        letter-spacing: -0.01em;
        line-height: 1.25;
        color: var(--text);
        opacity: 0.92;
      }

      .chips {
        display: flex;
        flex-wrap: nowrap;
        gap: 11px;
      }

      .chip {
        padding: 9px 17px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
        border: 1.5px solid rgba(122, 170, 206, 0.55);
        box-shadow: 0 6px 16px rgba(53, 88, 114, 0.1);
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
      }

      .chip .dot {
        color: var(--secondary);
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="ring"></div>
      <div class="ring inner"></div>
      <img class="mascot" src="../../assets/images/logo.png" alt="Hydro: Gulp mascot" />
      <div class="copy">
        <h1 class="brand">Hydro<span class="alt">: Gulp</span></h1>
        <p class="tagline">Track every sip.<br />Hit your daily goal.</p>
        <div class="chips">
          <span class="chip"><span class="dot">●</span>Reminders</span>
          <span class="chip"><span class="dot">●</span>Streaks</span>
          <span class="chip"><span class="dot">●</span>AI Coach</span>
        </div>
      </div>
    </div>
  </body>
</html>
